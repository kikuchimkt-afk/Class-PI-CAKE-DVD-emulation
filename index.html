<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI CAKE - DVD Reproducer</title>
    <meta name="description" content="DVDコンテンツのWeb再生アプリケーション">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>PI CAKE <span>DVD Web Reproducer</span></h1>
        </header>
        
        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>Contents</h2>
                </div>
                <div class="chapter-list" id="chapterList">
                    <!-- Chapters injected via JS -->
                </div>
            </aside>
            
            <main class="player-wrapper">
                <div class="video-container">
                    <video id="mainVideo" controls controlsList="nodownload">
                        <source src="" type="video/mp4" id="videoSource">
                        Your browser does not support the video tag.
                    </video>
                    <div class="custom-overlay" id="videoOverlay">
                        <button id="playBtn" class="play-btn" aria-label="Play Video">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="white">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>
        </div>
        
        <footer class="app-footer">
            <p>&copy; PI CAKE Project.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
